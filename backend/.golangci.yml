version: "2"

linters:
  # Enable only linters equivalent to golangci-lint v1 defaults
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    errcheck:
      # These defer patterns are idiomatic Go — errors are expected or not actionable
      exclude-functions:
        - (*database/sql.Tx).Rollback
        - (*database/sql.Rows).Close
        - (*database/sql.DB).Close
        - (io.Closer).Close
        - (*encoding/json.Encoder).Encode

formatters:
  exclusions:
    generated: lax

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
